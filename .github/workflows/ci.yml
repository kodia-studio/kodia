name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'cli/**'
      - '.github/workflows/ci.yml'
      - 'go.mod'
      - 'go.sum'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'cli/**'
      - '.github/workflows/ci.yml'
      - 'go.mod'
      - 'go.sum'
      - 'package.json'
      - 'pnpm-lock.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.22'
  NODE_VERSION: '20'

jobs:
  # Backend: Lint, Test, Build
  backend:
    runs-on: ubuntu-latest
    name: Backend CI
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          working-directory: ./backend
          args: --timeout=5m

      - name: Run tests
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.out
          flags: backend
          name: backend-coverage

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux go build \
            -ldflags="-s -w -X main.Version=${{ github.sha }}" \
            -o server \
            cmd/server/main.go

      - name: Check binary
        run: ./server version || echo "Binary built successfully"

  # Frontend: Lint, Type Check, Build
  frontend:
    runs-on: ubuntu-latest
    name: Frontend CI
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: './frontend/pnpm-lock.yaml'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter (ESLint)
        run: pnpm run lint

      - name: Run type check
        run: pnpm run check

      - name: Build
        run: pnpm run build
        env:
          PUBLIC_API_URL: 'http://localhost:8080/api'


  # Documentation: Verify Markdown
  docs:
    runs-on: ubuntu-latest
    name: Documentation Check
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown files exist
        run: |
          test -f docs/DEPLOYMENT.md && echo "✓ DEPLOYMENT.md" || exit 1
          test -f docs/TESTING.md && echo "✓ TESTING.md" || exit 1
          test -f docs/FRONTEND_GUIDE.md && echo "✓ FRONTEND_GUIDE.md" || exit 1
          test -f docs/ROADMAP.md && echo "✓ ROADMAP.md" || exit 1
          test -f docs/INDEX.md && echo "✓ INDEX.md" || exit 1

  # Integration: Docker build test
  docker:
    runs-on: ubuntu-latest
    name: Docker Build
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: kodia/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Summary
  test-results:
    runs-on: ubuntu-latest
    name: CI Results
    needs: [backend, frontend, docs, docker]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.backend.result }}" == "failure" || \
                "${{ needs.frontend.result }}" == "failure" || \
                "${{ needs.docs.result }}" == "failure" || \
                "${{ needs.docker.result }}" == "failure" ]]; then
            echo "❌ CI Pipeline Failed"
            exit 1
          fi
          echo "✅ All CI checks passed!"

      - name: Report success
        if: success()
        run: echo "🎉 Ready to merge!"
