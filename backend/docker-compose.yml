version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kodia-postgres
    environment:
      POSTGRES_USER: andiaryatno
      POSTGRES_PASSWORD: andiaryatno
      POSTGRES_DB: framework_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U andiaryatno -d framework_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kodia-network

  redis:
    image: redis:7-alpine
    container_name: kodia-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kodia-network

volumes:
  postgres_data:
  redis_data:

networks:
  kodia-network:
    driver: bridge
