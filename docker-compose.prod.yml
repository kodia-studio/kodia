version: '3.8'

services:
  # PostgreSQL database (production)
  postgres:
    image: postgres:16-alpine
    container_name: kodia-postgres
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DATABASE_USER:-kodia}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-change-me}
      POSTGRES_DB: ${DATABASE_NAME:-kodia_db}
      PGTZ: ${DATABASE_TIMEZONE:-UTC}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-kodia}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kodia-network

  # Redis cache (production)
  redis:
    image: redis:7-alpine
    container_name: kodia-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-change-me} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kodia-network

  # Meilisearch (optional, for full-text search)
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: kodia-meilisearch
    restart: always
    volumes:
      - meilisearch_data:/meili_data
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-change-me}
      MEILI_ENV: production
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - kodia-network
    profiles:
      - search

  # Kodia backend application
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kodia-app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      # Database
      APP_DATABASE_DRIVER: postgres
      APP_DATABASE_HOST: postgres
      APP_DATABASE_PORT: "5432"
      APP_DATABASE_NAME: ${DATABASE_NAME:-kodia_db}
      APP_DATABASE_USER: ${DATABASE_USER:-kodia}
      APP_DATABASE_PASSWORD: ${DATABASE_PASSWORD:-change-me}
      APP_DATABASE_SSL_MODE: disable
      # Redis
      APP_REDIS_HOST: redis
      APP_REDIS_PORT: "6379"
      APP_REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me}
      # Environment
      APP_ENV: production
      APP_DEBUG: "false"
    ports:
      - "8080:8080"
      - "9090:9090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - kodia-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  meilisearch_data:
    driver: local

networks:
  kodia-network:
    driver: bridge
