apiVersion: v1
kind: ConfigMap
metadata:
  name: kodia-config
  namespace: default
data:
  # Application Configuration
  APP_NAME: "kodia"
  APP_ENV: "production"
  APP_PORT: "8080"
  APP_DEBUG: "false"
  APP_BASE_URL: "https://api.example.com"
  APP_FRONTEND_URL: "https://example.com"

  # Database Configuration
  APP_DATABASE_DRIVER: "postgres"
  APP_DATABASE_HOST: "postgres.default.svc.cluster.local"
  APP_DATABASE_PORT: "5432"
  APP_DATABASE_NAME: "kodia_db"
  APP_DATABASE_USER: "kodia"
  APP_DATABASE_SSL_MODE: "require"
  APP_DATABASE_TIMEZONE: "UTC"
  APP_DATABASE_MAX_OPEN_CONNS: "25"
  APP_DATABASE_MAX_IDLE_CONNS: "5"

  # Redis Configuration
  APP_REDIS_HOST: "redis.default.svc.cluster.local"
  APP_REDIS_PORT: "6379"
  APP_REDIS_DB: "0"

  # CORS Configuration
  APP_CORS_ALLOWED_ORIGINS: "https://example.com"

  # JWT Configuration (in seconds/hours/days)
  APP_JWT_ACCESS_EXPIRY_HOURS: "1"
  APP_JWT_REFRESH_EXPIRY_DAYS: "30"

  # Observability Configuration
  APP_OBSERVABILITY_TRACING_ENABLED: "true"
  APP_OBSERVABILITY_METRICS_ENABLED: "true"
  APP_OBSERVABILITY_PROMETHEUS_PORT: "9090"
  APP_OBSERVABILITY_SERVICE_NAME: "kodia-api"
  APP_OBSERVABILITY_SAMPLING_RATE: "0.1"

  # Meilisearch (optional)
  # APP_SEARCH_ENABLED: "true"
  # APP_SEARCH_HOST: "meilisearch.default.svc.cluster.local"
  # APP_SEARCH_PORT: "7700"

  # Storage Configuration (optional S3)
  # APP_STORAGE_PROVIDER: "s3"
  # APP_STORAGE_BUCKET: "kodia-bucket"
  # APP_STORAGE_REGION: "us-east-1"
  # APP_STORAGE_PUBLIC_URL: "https://s3.amazonaws.com/kodia-bucket"
