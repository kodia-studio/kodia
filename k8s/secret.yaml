apiVersion: v1
kind: Secret
metadata:
  name: kodia-secret
  namespace: default
type: Opaque
# WARNING: Replace all base64-encoded values below with actual secrets
# Generate with: echo -n "your-secret-value" | base64
data:
  # Database Password - CHANGE THIS!
  # base64 encoded of "your-database-password"
  APP_DATABASE_PASSWORD: eW91ci1kYXRhYmFzZS1wYXNzd29yZA==

  # Redis Password - CHANGE THIS!
  # base64 encoded of "your-redis-password"
  APP_REDIS_PASSWORD: eW91ci1yZWRpcy1wYXNzd29yZA==

  # JWT Secrets - GENERATE NEW ONES!
  # Generate: openssl rand -base64 32
  # base64 encoded of 32-character secret
  APP_JWT_ACCESS_SECRET: YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3OA==
  APP_JWT_REFRESH_SECRET: YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3OA==

  # SMTP Mail Configuration - CHANGE THIS!
  MAIL_HOST: c210cC5leGFtcGxlLmNvbQ==
  MAIL_PORT: NTg3
  MAIL_USER: bm8tcmVwbHlAZXhhbXBsZS5jb20=
  MAIL_PASSWORD: eW91ci1zbXRwLXBhc3N3b3Jk
  MAIL_FROM_ADDR: bm8tcmVwbHlAZXhhbXBsZS5jb20=
  MAIL_FROM_NAME: S29kaWEgQXBw

  # Sentry DSN (optional) - CHANGE THIS if using Sentry!
  # Leave as empty string if not using Sentry
  APP_OBSERVABILITY_SENTRY_DSN: aHR0cHM6Ly9leGFtcGxlQHNlbnRyeS5pby9wcm9qZWN0LWlk

  # Meilisearch Master Key (optional) - CHANGE THIS!
  # APP_SEARCH_MASTER_KEY: eW91ci1tZWlsaXNlYXJjaC1tYXN0ZXIta2V5

  # AWS S3 Credentials (optional) - CHANGE THIS if using S3!
  # APP_STORAGE_ACCESS_ID: QVdTX0FDQ0VTUz9fS0VZX0lE
  # APP_STORAGE_SECRET_KEY: QVdTX1NFQ1JFVCBLRVk/

---

