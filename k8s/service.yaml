apiVersion: v1
kind: Service
metadata:
  name: kodia-api
  namespace: default
  labels:
    app.kubernetes.io/name: kodia
    app.kubernetes.io/component: api
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kodia
    app.kubernetes.io/component: api
  ports:
  # HTTP API port
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  # Prometheus metrics port
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  sessionAffinity: None

---

